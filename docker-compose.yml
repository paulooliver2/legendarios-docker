services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: legendarios-db
    environment:
      POSTGRES_DB: legendarios_db
      POSTGRES_USER: legendarios
      POSTGRES_PASSWORD: legendarios
    ports:
      - "5432:5432"
    volumes:
      - legendarios_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legendarios -d legendarios_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── API (Node.js + Express) ─────────────────────────────────────────────────
  api:
    build:
      context: ../legendarios-api
      dockerfile: Dockerfile
    container_name: legendarios-api
    environment:
      DATABASE_URL: postgresql://legendarios:legendarios@db:5432/legendarios_db
      PORT: 3333
      NODE_ENV: development
      JWT_ACCESS_SECRET: legendarios-access-secret-dev-apenas-local
      JWT_REFRESH_SECRET: legendarios-refresh-secret-dev-apenas-local
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3333:3333"
    volumes:
      - ../legendarios-api:/app
      - legendarios_api_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─── Web Admin (React + Vite) ────────────────────────────────────────────────
  web:
    build:
      context: ../legendarios-web
      dockerfile: Dockerfile
    container_name: legendarios-web
    environment:
      API_PROXY_TARGET: http://api:3333
    ports:
      - "5173:5173"
    volumes:
      - ../legendarios-web:/app
      - legendarios_web_modules:/app/node_modules
    depends_on:
      - api
    restart: unless-stopped

# ─── Volumes persistentes ────────────────────────────────────────────────────
volumes:
  legendarios_db_data:
  legendarios_api_modules:
  legendarios_web_modules:
